<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title | default: site.github.repository_name }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <style>
      .skip-link {
        position: absolute;
        top: -40px;
        left: 0;
        background: #000;
        color: #fff;
        padding: 8px;
        z-index: 100;
        text-decoration: none;
      }
      .skip-link:focus {
        top: 0;
      }
      /* Ensure inline content links are distinguishable without relying on color alone.
         Fixes axe rule: link-in-text-block (WCAG 1.4.1 / SC 1.4.1).
         The default Primer link color (#0366d6) has only 2.7:1 contrast against the
         surrounding text color (#24292e), which is below the 3:1 minimum required by
         the axe rule.  Adding an underline provides a non-color visual indicator. */
      .markdown-body a:not([class]) {
        text-decoration-line: underline;
        text-decoration-thickness: 0.08em;
        text-underline-offset: 0.15em;
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to main content</a>
    <main id="main-content">
      <div class="container-lg px-3 my-5 markdown-body">
        {{ content }}
      </div>
    </main>
  </body>
</html>
