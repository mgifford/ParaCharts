name: Update Live Data

on:
  schedule:
    - cron: '17 9 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-live-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update cached manifests
        env:
          BEA_API_KEY: ${{ secrets.BEA_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: python docs/scripts/update_live_data.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add docs/data/manifests docs/data/live-data-status.json
            git commit -m "chore(data): refresh live-data cache"
            git push
          else
            echo "No data changes to commit"
          fi
