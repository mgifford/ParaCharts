name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      NPM_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup npm auth
        if: ${{ env.NPM_AUTH_TOKEN != '' }}
        run: echo "//npm.fizz.studio/:_authToken=${NPM_AUTH_TOKEN}" >> .npmrc

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Validate npm auth token
        run: |
          if [ -z "${NPM_AUTH_TOKEN}" ]; then
            echo "::error::Missing NPM_AUTH_TOKEN secret. Set repository secret NPM_AUTH_TOKEN with read access to https://npm.fizz.studio."
            exit 1
          fi
          if ! npm --userconfig .npmrc whoami --registry=https://npm.fizz.studio >/dev/null 2>&1; then
            echo "::error::Invalid NPM_AUTH_TOKEN for https://npm.fizz.studio. Update repository secret NPM_AUTH_TOKEN."
            exit 1
          fi

      - name: Install dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 30
          command: npm ci

      - name: Show npm log tail on failure
        if: failure()
        run: tail -200 /home/runner/.npm/_logs/*.log || true

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: npm run test:unit
