name: Accessibility Scanner

on:
  workflow_dispatch:
    inputs:
      scan_scope:
        description: URL set to scan
        required: true
        default: core
        type: choice
        options:
          - core
          - full
  schedule:
    - cron: '23 10 * * 1'
  pull_request:
    branches: [main]
    types: [ready_for_review, labeled]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: accessibility-scan-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  scan:
    if: |
      github.event_name != 'pull_request' ||
      github.event.action == 'ready_for_review' ||
      (github.event.action == 'labeled' && github.event.label.name == 'a11y-scan')
    runs-on: ubuntu-latest
    steps:
      - name: Validate scanner prerequisites
        id: prereqs
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "::notice::GH_TOKEN secret is not set. The accessibility scanner requires a fine-grained PAT with actions:write, contents:write, issues:write, pull-requests:write, and metadata:read access. Add a GH_TOKEN repository secret to enable issue filing. Falling back to built-in GITHUB_TOKEN, which cannot file issues."
          else
            echo "GH_TOKEN secret is configured."
          fi

          # Check whether Issues are enabled — the scanner requires Issues to file findings.
          token="${GH_TOKEN:-$GITHUB_TOKEN}"
          api_response=$(curl -sf -H "Authorization: Bearer ${token}" \
            "https://api.github.com/repos/${{ github.repository }}" 2>&1)
          if [ $? -ne 0 ]; then
            echo "::warning::Could not reach GitHub API to check if Issues is enabled (network error or invalid token). Assuming Issues is disabled and skipping scan to be safe."
            echo "can_scan=false" >> "$GITHUB_OUTPUT"
          else
            has_issues=$(echo "${api_response}" \
              | python3 -c "import json,sys; print(json.load(sys.stdin).get('has_issues', False))" 2>/dev/null || echo "False")
            if [ "${has_issues}" != "True" ]; then
              echo "::notice::GitHub Issues is disabled in this repository. The accessibility scanner requires Issues to be enabled in order to file findings. Enable Issues under Settings > General > Features, then re-run this workflow."
              echo "can_scan=false" >> "$GITHUB_OUTPUT"
            else
              echo "can_scan=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Select URL set
        id: urls
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_SCOPE: ${{ inputs.scan_scope }}
        run: |
          scope="${DISPATCH_SCOPE:-core}"
          if [ "${EVENT_NAME}" != "workflow_dispatch" ]; then
            scope="core"
          fi

          if [ "${scope}" = "full" ]; then
            {
              echo 'urls<<EOF'
              echo 'https://mgifford.github.io/ParaCharts/'
              echo 'https://mgifford.github.io/ParaCharts/exampleGallery.html'
              echo 'https://mgifford.github.io/ParaCharts/accessibility.html'
              echo 'https://mgifford.github.io/ParaCharts/example-bar-comparison.html'
              echo 'https://mgifford.github.io/ParaCharts/example-line-trend.html'
              echo 'https://mgifford.github.io/ParaCharts/example-scatter-clusters.html'
              echo 'https://mgifford.github.io/ParaCharts/example-heatmap-hourly-live.html'
              echo 'https://mgifford.github.io/ParaCharts/example-waterfall-contribution-live.html'
              echo EOF
            } >> "$GITHUB_OUTPUT"
            echo "cache_key=cached_results-ParaCharts-full-main.json" >> "$GITHUB_OUTPUT"
          else
            {
              echo 'urls<<EOF'
              echo 'https://mgifford.github.io/ParaCharts/'
              echo 'https://mgifford.github.io/ParaCharts/exampleGallery.html'
              echo 'https://mgifford.github.io/ParaCharts/accessibility.html'
              echo EOF
            } >> "$GITHUB_OUTPUT"
            echo "cache_key=cached_results-ParaCharts-core-main.json" >> "$GITHUB_OUTPUT"
          fi

      - name: Run accessibility scanner
        if: steps.prereqs.outputs.can_scan == 'true'
        uses: github/accessibility-scanner@v2
        with:
          urls: ${{ steps.urls.outputs.urls }}
          repository: ${{ github.repository }}
          token: ${{ github.token }}
          cache_key: ${{ steps.urls.outputs.cache_key }}
          skip_copilot_assignment: true
          include_screenshots: false
          reduced_motion: reduce
          color_scheme: light