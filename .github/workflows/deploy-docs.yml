name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NPM_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
    outputs:
      skip: ${{ steps.validate.outputs.skip }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup npm auth
        if: ${{ env.NPM_AUTH_TOKEN != '' }}
        run: echo "//npm.fizz.studio/:_authToken=${NPM_AUTH_TOKEN}" >> .npmrc

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Validate npm auth token
        id: validate
        run: |
          if [ -z "${NPM_AUTH_TOKEN}" ]; then
            echo "::warning::NPM_AUTH_TOKEN secret is not configured. Docs build requires access to https://npm.fizz.studio. Set repository secret NPM_AUTH_TOKEN with read access to that registry to enable docs deployment."
            echo "SKIP_BUILD=true" >> $GITHUB_ENV
            echo "skip=true" >> $GITHUB_OUTPUT
          elif ! npm --userconfig .npmrc whoami --registry=https://npm.fizz.studio >/dev/null 2>&1; then
            echo "::error::Invalid NPM_AUTH_TOKEN for https://npm.fizz.studio. Update repository secret NPM_AUTH_TOKEN."
            exit 1
          fi

      - name: Setup Pages
        if: ${{ env.SKIP_BUILD != 'true' }}
        uses: actions/configure-pages@v5

      - name: Install dependencies
        if: ${{ env.SKIP_BUILD != 'true' }}
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 30
          command: npm ci

      - name: Build docs
        if: ${{ env.SKIP_BUILD != 'true' }}
        run: npm run docs:build

      - name: Upload artifact
        if: ${{ env.SKIP_BUILD != 'true' }}
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    if: ${{ needs.build.outputs.skip != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
